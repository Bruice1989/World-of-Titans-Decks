- name: Build APK (debug)
        run: |
          mkdir -p logs
          buildozer -v android debug 2>&1 | tee logs/build.log
        continue-on-error: true

      - name: Show last 150 lines of build log
        if: always()
        run: |
          echo "=== ЛОГ ==="
          cat logs/build.log 2>/dev/null | tail -150 || echo "Лог порожній"

      - name: Upload FULL build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: logs/build.log
          if-no-files-found: warn
          retention-days: 7
