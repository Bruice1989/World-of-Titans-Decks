name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev build-essential ccache \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Set JAVA_HOME to Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_HOME/licenses/google-gdk-license
          yes | $ANDROID_HOME/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null || true

      - name: Clear old Buildozer cache
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip wheel
          pip install Cython==0.29.37
          pip install buildozer==1.5.0
          pip install python-for-android==2024.1.21

      - name: Build APK (debug)
        run: |
          mkdir -p logs
          buildozer -v android debug 2>&1 | tee logs/build.log
        continue-on-error: true

      - name: Show last 100 lines of build log
        if: always()
        run: tail -100 logs/build.log || echo "Лог не знайдено"

      - name: Upload FULL build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: logs/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WorldOfTitans-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
